services:
  c2-server:
    build: .
    container_name: hive-c2
    ports: ["8444:8444"]
    volumes:
      - ./loot:/hive/loot
    command: /hive/bin/c2-server --port 8444 --loot-dir /hive/loot --db-path /hive/c2.db

  queen:
    build: .
    container_name: hive-queen
    depends_on: [c2-server]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_TELEMETRY_DIR=/tmp/hive_telemetry
      - HIVE_C2_URL=http://c2-server:8444/collect
      - HIVE_C2_DNS_DOMAIN=tunnel.example.com
      - HIVE_C2_ICMP_TARGET=8.8.8.8
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/queen
    ports: ["4200:4200"]

  worker:
    build: .
    container_name: hive-worker
    depends_on: [queen]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_C2_URL=http://c2-server:8444/collect
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/worker

  honeybee:
    build: .
    container_name: hive-honeybee
    depends_on: [queen, c2-server]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_TELEMETRY_DIR=/tmp/hive_telemetry
      - HIVE_C2_URL=http://c2-server:8444/collect
      - HIVE_C2_DNS_DOMAIN=tunnel.example.com
      - HIVE_C2_ICMP_TARGET=8.8.8.8
      - HIVE_EXEC_TIMEOUT=30
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/honeybee

  drone:
    build: .
    container_name: hive-drone
    depends_on: [queen]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_C2_URL=http://c2-server:8444/collect
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/drone

  weaver:
    build: .
    container_name: hive-weaver
    depends_on: [queen]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_C2_URL=http://c2-server:8444/collect
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/weaver

  swarm:
    build: .
    container_name: hive-swarm
    depends_on: [queen, c2-server]
    environment:
      - __HIVE_ARENA=hive_arena
      - HIVE_LAB_MODE=1
      - HIVE_C2_URL=http://c2-server:8444/collect
      - RUST_LOG=info
    volumes:
      - hive_arena:/dev/shm
    command: /hive/bin/swarm

  victim:
    build: .
    container_name: hive-victim
    environment:
      - HIVE_LAB_MODE=1
    volumes:
      - hive_arena:/dev/shm
    command: >
      sh -c "
      mkdir -p /root/Documents /root/.ssh /root/.aws /tmp/financial_data &&
      printf 'account,balance,date\n1001,1250000,2024-01-15\n1002,3400000,2024-01-14\n' > /tmp/financial_data/ledger.csv &&
      echo 'export DB_PASS=secret123' > /root/.bashrc &&
      echo '<?php \$dbpass=\"pass123\"; ?>' > /root/Documents/config.php &&
      echo 'AWS_KEY=AKIA123456789' > /root/.aws/credentials &&
      tail -f /dev/null
      "

  monitor:
    build: .
    container_name: hive-monitor
    depends_on: [victim]
    volumes:
      - hive_arena:/dev/shm
    command: python3 /hive/tests/monitor_detections.py --watch --interval 10

  dashboard:
    build: .
    container_name: hive-dashboard
    depends_on: [c2-server]
    ports: ["8080:8080"]
    volumes:
      - /tmp:/tmp
      - /var/log:/var/log:ro
    command: python3 /hive/tests/dashboard.py --port 8080 --host 0.0.0.0

  ollama:
    image: ollama/ollama:latest
    container_name: hive-ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["llm"]

volumes:
  hive_arena:
    driver_opts:
      type: tmpfs
      device: tmpfs
  ollama_data:
