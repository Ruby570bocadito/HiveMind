apiVersion: v1
kind: Service
metadata:
  name: {{ include "hive-colony.fullname" . }}-c2
  labels: {{- include "hive-colony.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8444
    targetPort: 8444
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/component: c2
    {{- include "hive-colony.selectorLabels" . | nindent 4 }}
