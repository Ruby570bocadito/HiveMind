apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hive-colony.fullname" . }}-arena
  labels: {{- include "hive-colony.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: {{ .Values.arena.size }}
  storageClassName: {{ .Values.arena.storageClass }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hive-colony.fullname" . }}-c2
  labels: {{- include "hive-colony.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: c2
      {{- include "hive-colony.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: c2
        {{- include "hive-colony.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hive-colony.serviceAccountName" . }}
      containers:
      - name: c2
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/hive/bin/c2-server"]
        ports:
        - containerPort: 8444
          name: http
        volumeMounts:
        - name: loot
          mountPath: /hive/loot
        - name: arena
          mountPath: /hive_arena
        envFrom:
        - configMapRef:
            name: {{ include "hive-colony.fullname" . }}-config
      volumes:
      - name: loot
        emptyDir: {}
      - name: arena
        persistentVolumeClaim:
          claimName: {{ include "hive-colony.fullname" . }}-arena
---
{{- range $agent := list "queen" "worker" "drone" "honeybee" "weaver" "swarm" }}
{{- if index $.Values.agents $agent "enabled" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hive-colony.fullname" $ }}-{{ $agent }}
  labels: {{- include "hive-colony.labels" $ | nindent 4 }}
spec:
  replicas: {{ index $.Values.agents $agent "replicas" }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $agent }}
      {{- include "hive-colony.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ $agent }}
        {{- include "hive-colony.selectorLabels" $ | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hive-colony.serviceAccountName" $ }}
      hostPID: true
      hostNetwork: true
      containers:
      - name: {{ $agent }}
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        command: ["/hive/bin/{{ $agent }}"]
        securityContext:
          privileged: {{ $.Values.securityContext.privileged }}
          runAsUser: 0
        env:
        - name: __HIVE_ARENA
          value: /hive_arena/arena.bin
        envFrom:
        - configMapRef:
            name: {{ include "hive-colony.fullname" $ }}-config
        resources: {{- index $.Values.agents $agent "resources" | toYaml | nindent 10 }}
        volumeMounts:
        - name: arena
          mountPath: /hive_arena
      volumes:
      - name: arena
        persistentVolumeClaim:
          claimName: {{ include "hive-colony.fullname" $ }}-arena
      tolerations: {{- $.Values.tolerations | toYaml | nindent 8 }}
{{- end }}
{{- end }}
